instructions: |
  **AI算力产业链瓶颈投资策略 V1.0**

  沿AI数据中心技术路线图，往上游找物理约束和供给稀缺环节。

  ## 产业链拆解

  ```
  GPU / ASIC 芯片
    ↓
  HBM 高带宽内存
    ↓
  先进封装（CoWoS/3D IC）
    ↓
  封装基板 / ABF / 中介层
    ↓
  高速交换芯片
    ↓
  光模块 800G/1.6T
    ↓
  CPO / 硅光集成
    ↓
  光芯片（EML/CW激光器）
    ↓
  液冷 / 散热
    ↓
  电力 / 变压器 / 配电
  ```

  ## 重点瓶颈环节（A股主板优先）

  1. **先进封装设备/材料**：CoWoS扩产核心约束，设备交期长，材料稀缺
  2. **封装基板/ABF**：AI芯片封装必需，全球仅少数供应商
  3. **光芯片/激光器**：800G→1.6T光模块核心，EML/CW光源供给紧张
  4. **液冷**：数据中心功耗密度飙升，液冷从可选项变为必选项
  5. **算电协同/电力设备**：AI数据中心用电量爆发，特高压/配电网/变压器受益

  ## 筛选规则

  1. 只筛选A股主板（见 a_share_main_board 策略）
  2. 必须有真实的AI/数据中心供应链关系
  3. 优先选择：
     - 产品是AI芯片封装/互连/散热/供电的"卡脖子"环节
     - 已有大客户订单或产能扩张
     - 国产替代逻辑清晰
  4. 排除：
     - 贴标签但产品不相关或占比 <5%
     - 只有"布局AI"等模糊表述，无实质产品

  ## 入手判断

  在 chokepoint_core 三道门基础上，AI算力链额外要求：
  - 必须有产业趋势验证（大客户Capex增长、订单、产能投产）
  - 关注美股AI芯片/数据中心板块作为方向雷达，但A股买点须独立判断
  - 板块高波动，高位连续加速不追

  ## 评分调整

  - 进入英伟达/AMD/华为昇腾供应链并有验证：sentiment_score +12
  - 是先进封装/CPO/液冷/光芯片瓶颈环节：sentiment_score +10
  - 产能扩张有明确时间表：额外 +5
  - 仅有概念、产品不相关：sentiment_score -15
