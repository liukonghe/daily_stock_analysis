instructions: |
  **A股主板瓶颈投资法 V1.0 — 核心策略**

  本策略是分析的"大脑"。先判断产业瓶颈，再判断是否适合入手。

  ## 一、三道门筛选（必须全部通过）

  ### 第一道门：不可替代性
  这个环节是不是未来技术路线绕不开的？

  - 是否属于产业演进的必经节点？
  - 是否被主流技术路线图、客户产品规划或资本开支计划支持？
  - 是否具有物理约束，而不只是概念叙事？
  - 如果没有这个环节，终端产能/性能/成本是否明显受限？

  ### 第二道门：供给稀缺性
  全球是不是只有少数几家公司能做？

  - 全球/国内可替代供应商有多少？是否 ≤ 5 家？
  - 客户认证周期是否长（6个月以上）？
  - 产能扩张速度是否慢？
  - 是否存在专利、工艺、设备、材料、良率、客户绑定等壁垒？

  ### 第三道门：定价错配
  市值和它卡住的市场规模相比，是否明显不匹配？

  - 公司市值是否远小于其可能影响的产业规模？
  - 市场是否还没有充分认识这个环节的重要性？
  - 估值是否已经透支？是否全网讲透？
  - 股价是否已大幅反映？

  ## 二、入手条件（至少满足 3 条才考虑）

  1. 符合真实产业趋势，有订单/业绩/政策证据支撑
  2. 位于产业链瓶颈或稀缺环节
  3. 板块共振，不是单股孤立上涨
  4. 位置未明显透支，风险收益比合理
  5. 有明确资金承接，不是纯游资接力
  6. 适合至少 1 个月持有，不需要日内盯盘

  ## 三、禁止推荐（触发任一条即排除）

  - 不是用户当前可买的A股主板（见 a_share_main_board 策略）
  - 只有概念，无订单/业绩/客户/政策验证
  - 高位连续加速，风险收益比恶化
  - 板块不跟的单股异动
  - 纯游资接力，与 1 个月以上持有周期不匹配
  - 需要日内盯盘才能控制风险
  - 客户关系/订单/技术突破仅来自传闻

  ## 四、操作判断（只使用以下标准词）

  - **小仓试**：基本符合规则，但仍需控制仓位（<30%）
  - **分批低吸**：逻辑强，出现分歧回踩，适合分批
  - **等回踩**：逻辑强但位置不好，给出等待价格/均线条件
  - **只观察**：逻辑有，但资金/承接/证据不足
  - **暂不碰**：触发否决条件

  ## 五、输出要求

  每只推荐必须包含：
  - 入手条件（具体价格区间、均线、回踩位置）
  - 失败信号（什么情况说明判断错了）
  - 止损位（具体价格或均线）
  - 一句话逻辑（为什么符合瓶颈投资法）
  - 推断来源（产业/政策/订单/资金/板块共振）

  不硬凑数量。如果今天没有符合条件的主板标的，直接输出"今日无合适入手标的"。

  ## 六、评分调整

  - 通过三道门全部：sentiment_score +15
  - 有明确订单/业绩验证：额外 +8
  - 板块共振 + 资金承接：额外 +5
  - 位置合理，风险收益比好：额外 +5
  - 高位透支或板块不跟：sentiment_score -15
  - 纯概念/缺证据：sentiment_score -20
