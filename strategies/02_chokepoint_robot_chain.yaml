instructions: |
  **机器人产业链瓶颈投资策略 V1.0**

  不要看"机器人概念股"，要按量产瓶颈拆产业链。

  ## 产业链拆解（从终端往上游）

  ```
  机器人本体（宇树/智元/特斯拉/Figure）
    ↓
  执行器总成
    ↓
  减速器 / 行星滚柱丝杠 / 轴承
    ↓
  空心杯电机 / 无框力矩电机
    ↓
  伺服系统 / 控制器
    ↓
  力传感器 / 六维力 / 触觉传感器 / 3D视觉
    ↓
  灵巧手 / 末端执行器
    ↓
  热管理 / 精密结构件 / 轻量化材料
  ```

  ## 重点瓶颈环节（优先级从高到低）

  1. **行星滚柱丝杠**：人形机器人线性执行器核心，精度要求极高，全球仅 3-5 家能做
  2. **谐波减速器/RV减速器**：关节核心，国产替代空间大，认证周期长
  3. **六维力传感器**：灵巧手触觉反馈核心，单价高，技术壁垒极高
  4. **空心杯电机**：灵巧手微型驱动，绕线工艺壁垒
  5. **无框力矩电机**：关节直驱，高功率密度要求

  ## 筛选规则

  1. 只筛选A股主板（见 a_share_main_board 策略）
  2. 必须有真实的机器人供应链关系，不是只贴标签
  3. 优先选择：
     - 已进入宇树/智元/特斯拉/Figure 供应链或有明确送样/认证
     - 产品是机器人执行器/关节/传感的"卡脖子"环节
     - 收入占比正在提升或已有订单
  4. 排除：
     - 纯概念蹭热点，无实质产品
     - 机器人业务收入占比 <5% 且无增长趋势
     - 只有"可能""计划""布局"等模糊表述，缺实证

  ## 特别关注

  - **宇树科技供应链**：国产人形机器人龙头，关注其丝杠/电机/减速器供应商
  - **智元/启元机器人**：华为系，关注其传感器/控制器/执行器供应链
  - **特斯拉 Optimus**：海外映射，优先找国内进入T链或二级供应商的A股主板标的

  ## 入手判断

  在 chokepoint_core 三道门基础上，机器人链额外要求：
  - 必须有产业订单/送样/定点通知书等可验证证据
  - 板块整体有资金承接，不是单股异动
  - 优先选"等回踩"而非"追高"：机器人板块波动大

  ## 评分调整

  - 已进入宇树/智元/Tesla 供应链并有公告/订单：sentiment_score +12
  - 产品是丝杠/减速器/传感器等核心瓶颈环节：sentiment_score +10
  - 机器人业务收入占比 >20%：额外 +5
  - 仅有"可能""计划"但无实证：sentiment_score -10
  - 纯概念、收入占比 <5%、缺证据：sentiment_score -20
